<!DOCTYPE html>
<html>
<head>
    <style>
        /* Main Container Styling */
        .main-container {
            padding: 20px;
            background-color: #f5f5f5;
        }

        /* Individual Testimonial Box Styling */
        .testimonial {
            padding: 15px;
            border: 1px solid #000;
            background-color: #ffffff;
            margin-bottom: 10px;
        }

        /* Testimonial Text */
        .text {
            /* Normal styling as per requirement */
        }

        /* Author Styling */
        .author {
            text-align: right;
            font-style: italic;
        }
    </style>
</head>
<body>

    <h1>Testimonials</h1>

    <div class="main-container">
        <div class="testimonial">
            <p class="text">This service is amazing!</p>
            <p class="author">- John Doe</p>
        </div>

        <div class="testimonial">
            <p class="text">Highly professional team.</p>
            <p class="author">- Jane Smith</p>
        </div>
    </div>

</body>
</html>
